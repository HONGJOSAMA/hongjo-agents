name: phase1-schema-validation

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate Phase 1 samples
        run: node foundation/tests/schema-validation/generate_phase1_samples.mjs

      - name: Validate schema v1
        run: node foundation/tests/schema-validation/validate_schema_v1.mjs
