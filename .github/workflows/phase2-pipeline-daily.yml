name: phase2-pipeline-daily

on:
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PIPELINE_MIN_INGEST_SUCCESS_RATE: "95"
      PIPELINE_MAX_MISSING_RATE: "5"
      PIPELINE_MAX_DUPLICATE_RATE: "2"
      PIPELINE_ORGANIZATION_ID: ${{ vars.PIPELINE_ORGANIZATION_ID || 'org-demo-001' }}
      PIPELINE_DEFAULT_DOMAIN_KEY: ${{ vars.PIPELINE_DEFAULT_DOMAIN_KEY || 'cyber_information' }}
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      API_ENDPOINT: ${{ vars.API_ENDPOINT || '/observations' }}
      API_TOKEN: ${{ secrets.API_TOKEN }}
      DOC_INPUT_DIR: ${{ vars.DOC_INPUT_DIR || 'foundation/data/input/documents' }}
      CSV_INPUT_DIR: ${{ vars.CSV_INPUT_DIR || 'foundation/data/input/csv' }}
      CONNECTOR_MAPPING_FILE: "foundation/ops/pipelines/connectors/connector-mapping.json"
      CONNECTOR_MAPPING_PROFILE: ${{ vars.CONNECTOR_MAPPING_PROFILE || 'default' }}
      PIPELINE_ALERT_WEBHOOK: ${{ secrets.PIPELINE_ALERT_WEBHOOK }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate phase1 sample input (fallback)
        run: node foundation/tests/schema-validation/generate_phase1_samples.mjs

      - name: Run phase2 pipeline draft
        run: node foundation/ops/pipelines/run_phase2_pipeline_draft.mjs

      - name: Replay quarantined rows
        if: always()
        continue-on-error: true
        run: node foundation/ops/pipelines/replay_quarantine.mjs

      - name: Reinject replay output to normalized stream
        if: always()
        continue-on-error: true
        run: node foundation/ops/pipelines/reinject_replay_output.mjs

      - name: Run security scan (non-blocking)
        if: always()
        env:
          PHASE2_SECURITY_SCAN_STRICT: "0"
        run: node foundation/ops/pipelines/run_phase2_security_scan.mjs

      - name: Generate domain health (non-blocking)
        if: always()
        env:
          PHASE2_DOMAIN_HEALTH_STRICT: "0"
        run: node foundation/ops/pipelines/generate_phase2_domain_health.mjs

      - name: Notify on quality gate failure
        if: ${{ failure() && env.PIPELINE_ALERT_WEBHOOK != '' }}
        run: |
          node -e 'const fs=require("fs");let s={};try{s=JSON.parse(fs.readFileSync("foundation/evaluation/metrics/data_quality_summary.json","utf8"));}catch{};const txt=`[phase2-pipeline-daily] quality gate failed\nrun=${s.runId||"n/a"} ingest=${s.ingestSuccessRate??"n/a"}% missing=${s.missingRate??"n/a"}% duplicate=${s.duplicateRate??"n/a"}%`;console.log(txt);fs.writeFileSync("/tmp/p2-alert.json",JSON.stringify({text:txt}));'
          curl -sS -X POST -H "Content-Type: application/json" --data @/tmp/p2-alert.json "$PIPELINE_ALERT_WEBHOOK"

      - name: Upload pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase2-pipeline-artifacts
          path: |
            foundation/data/raw/api/phase2-api-sample.jsonl
            foundation/data/raw/documents/phase2-doc-sample.jsonl
            foundation/data/raw/csv/phase2-csv-sample.jsonl
            foundation/data/normalized/phase2-normalized-sample.jsonl
            foundation/data/quarantine/phase2-quarantine-latest.jsonl
            foundation/data/quarantine/phase2-replay-output.jsonl
            foundation/evaluation/metrics/data_quality_report.md
            foundation/evaluation/metrics/data_quality_summary.json
            foundation/evaluation/metrics/quarantine-replay-report.md
            foundation/evaluation/metrics/reinject-replay-report.md
            foundation/evaluation/metrics/phase2-security-scan-report.md
            foundation/evaluation/metrics/phase2-security-scan-report.json
            foundation/evaluation/metrics/phase2-domain-health.md
            foundation/evaluation/metrics/phase2-domain-health.json
