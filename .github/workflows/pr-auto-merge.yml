name: pr-auto-merge

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge (squash)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            const pr = await github.rest.pulls.get({ owner, repo, pull_number });

            if (!pr.data.node_id) {
              core.setFailed("missing_pull_request_node_id");
              return;
            }

            if (pr.data.state !== "open") {
              core.info("skip_not_open");
              return;
            }

            if (pr.data.base?.ref !== "main") {
              core.info("skip_not_main_base");
              return;
            }

            try {
              await github.graphql(
                `mutation($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId
                    mergeMethod: SQUASH
                  }) {
                    clientMutationId
                  }
                }`,
                { pullRequestId: pr.data.node_id },
              );
              core.info(`enabled_auto_merge_pr_${pull_number}`);
            } catch (error) {
              const message = String(error?.message || "");
              if (
                message.includes("Pull request is in clean status") ||
                message.includes("Auto merge is disabled")
              ) {
                core.warning(`auto_merge_not_enabled_now_pr_${pull_number}: ${message}`);
                return;
              }
              throw error;
            }
