name: pr-auto-merge

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  check_suite:
    types:
      - completed

permissions:
  checks: read
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge (squash)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const eventName = context.eventName;
            const prNumbers = new Set();

            if (eventName === "pull_request") {
              prNumbers.add(context.payload.pull_request.number);
            }

            if (eventName === "check_suite") {
              for (const pr of context.payload.check_suite.pull_requests || []) {
                if (pr?.number) {
                  prNumbers.add(pr.number);
                }
              }
            }

            if (prNumbers.size === 0) {
              core.info("skip_no_associated_pr");
              return;
            }

            async function enableAutoMergeForPr(pull_number) {
              const pr = await github.rest.pulls.get({ owner, repo, pull_number });

              if (!pr.data.node_id) {
                core.warning(`skip_missing_node_id_pr_${pull_number}`);
                return;
              }

              if (pr.data.state !== "open") {
                core.info(`skip_not_open_pr_${pull_number}`);
                return;
              }

              if (pr.data.draft) {
                core.info(`skip_draft_pr_${pull_number}`);
                return;
              }

              if (pr.data.base?.ref !== "main") {
                core.info(`skip_not_main_base_pr_${pull_number}`);
                return;
              }

              if (pr.data.head?.repo?.full_name !== `${owner}/${repo}`) {
                core.info(`skip_fork_pr_${pull_number}`);
                return;
              }

              try {
                await github.graphql(
                  `mutation($pullRequestId: ID!) {
                    enablePullRequestAutoMerge(input: {
                      pullRequestId: $pullRequestId
                      mergeMethod: SQUASH
                    }) {
                      clientMutationId
                    }
                  }`,
                  { pullRequestId: pr.data.node_id },
                );
                core.info(`enabled_auto_merge_pr_${pull_number}`);
              } catch (error) {
                const message = String(error?.message || "");
                if (
                  message.includes("Pull request is in unstable status") ||
                  message.includes("Pull request is in clean status") ||
                  message.includes("Auto merge is disabled")
                ) {
                  core.warning(`auto_merge_not_enabled_now_pr_${pull_number}: ${message}`);
                  return;
                }
                throw error;
              }
            }

            for (const pull_number of prNumbers) {
              await enableAutoMergeForPr(pull_number);
            }
