name: phase3-domain-agents-smoke

on:
  pull_request:
    paths:
      - "agents/**"
      - "foundation/data/normalized/**"
      - "foundation/ontology/**"
      - "multi_agent_plan.md"
  push:
    branches:
      - main
    paths:
      - "agents/**"
      - "foundation/data/normalized/**"
      - "foundation/ontology/**"

jobs:
  smoke-and-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run domain agent smoke
        run: node agents/run_all_domain_agents.mjs

      - name: Run domain agent evaluation
        run: node agents/evaluate_domain_agents.mjs

      - name: Run specialforce context adapter smoke
        run: node agents/run_domain_agents_from_specialforce_context.mjs

      - name: Build orchestrator input draft
        run: node foundation/orchestrator/build_orchestrator_input_v1.mjs

      - name: Upload domain agent artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase3-domain-agent-artifacts
          path: |
            foundation/evaluation/agents
            foundation/evaluation/metrics/phase3-domain-agent-smoke.md
            foundation/evaluation/metrics/phase3-domain-agent-smoke.json
            foundation/evaluation/metrics/phase3-domain-agent-eval.md
            foundation/evaluation/metrics/phase3-domain-agent-eval.json
            foundation/evaluation/metrics/phase3-specialforce-adapter-smoke.md
            foundation/evaluation/metrics/phase3-specialforce-adapter-smoke.json
            foundation/evaluation/metrics/phase4-orchestrator-input-smoke.md
            foundation/evaluation/metrics/phase4-orchestrator-input-smoke.json
            foundation/evaluation/orchestrator/phase4-orchestrator-input-v1.json
            foundation/data/specialforce/specialforce-context-sample.json
            foundation/data/normalized/phase3-specialforce-adapter.jsonl
