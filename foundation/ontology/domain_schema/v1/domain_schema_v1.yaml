version: v1
updatedAt: 2026-03-05

principles:
  - domain_first
  - evidence_first
  - organization_boundary_required
  - additive_schema_evolution

entities:
  Observation:
    description: Raw or normalized signal from internal/external sources
    required:
      - id
      - organizationId
      - sourceType
      - sourceKey
      - observedAt
      - domainKey
      - signalType
      - signalValue
      - confidence
    optional:
      - tags
      - piiFlag
      - lineageId
      - ingestionRunId

  Hypothesis:
    description: Candidate explanation generated by a domain agent
    required:
      - id
      - organizationId
      - domainKey
      - claim
      - assumptions
      - createdAt
    optional:
      - counterfactual
      - confidence
      - linkedObservationIds

  Prediction:
    description: Orchestrated probabilistic forecast
    required:
      - id
      - organizationId
      - runKey
      - domainKey
      - horizonValue
      - horizonUnit
      - probability
      - modelVersion
      - promptHash
      - createdAt
    optional:
      - confidence
      - selectedPolicyRule
      - conflictScore
      - dissentCount
      - inferenceCostUsd
      - inferenceLatencyMs
      - trainingSessionId
      - aarReportId

  Evidence:
    description: Traceable evidence used for prediction rationale
    required:
      - id
      - organizationId
      - predictionId
      - sourceUrl
      - trustScore
      - freshness
      - createdAt
    optional:
      - sourceTitle
      - excerpt
      - sourceType

  Dissent:
    description: Minority or conflicting view from domain/meta agents
    required:
      - id
      - organizationId
      - predictionId
      - domainKey
      - dissentReason
      - alternative
      - createdAt
    optional:
      - dissentScore

  Outcome:
    description: Ground-truth outcome for calibration and evaluation
    required:
      - id
      - organizationId
      - predictionId
      - outcomeLabel
      - observedResult
      - observedAt
    optional:
      - impactScore
      - severityText

  ActionItemLink:
    description: Link between prediction and operational action item
    required:
      - id
      - organizationId
      - predictionId
      - actionItemId
      - createdAt
    optional:
      - linkReason

relations:
  - from: Observation
    to: Hypothesis
    type: informs
  - from: Hypothesis
    to: Prediction
    type: supports
  - from: Evidence
    to: Prediction
    type: justifies
  - from: Dissent
    to: Prediction
    type: challenges
  - from: Prediction
    to: Outcome
    type: validated_by
  - from: Prediction
    to: ActionItemLink
    type: triggers

crossDomainKeys:
  - macroeconomy
  - policy_politics
  - geopolitics_security
  - supply_chain_trade
  - cyber_information

metadata:
  required:
    - version
    - lineageId
    - policyTag
    - piiFlag
    - runKey
    - modelVersion
    - promptHash
    - inferenceCostUsd
    - inferenceLatencyMs

validationRules:
  - name: probability_range
    rule: 0 <= probability <= 1
  - name: confidence_range
    rule: confidence is null or (0 <= confidence <= 1)
  - name: trust_score_range
    rule: 0 <= trustScore <= 1
  - name: org_boundary
    rule: all linked records must share organizationId
  - name: evidence_minimum
    rule: each prediction must have at least 1 evidence record
